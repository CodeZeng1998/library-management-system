<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{fine.title} - #{app.name}|">Fine Management - Library Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="#{fine.title}">Fine Management</h1>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <section class="dashboard-metrics">
            <article class="stat-card">
                <div class="stat-label" th:text="#{fine.metrics.unpaid}">Unpaid</div>
                <div class="stat-value" th:text="${unpaidCount}">0</div>
            </article>
            <article class="stat-card">
                <div class="stat-label" th:text="#{fine.metrics.totalUnpaid}">Receivable</div>
                <div class="stat-value" th:text="${totalUnpaidAmount}">0</div>
            </article>
            <article class="stat-card">
                <div class="stat-label" th:text="#{fine.metrics.paid}">Paid</div>
                <div class="stat-value" th:text="${paidCount}">0</div>
            </article>
            <article class="stat-card">
                <div class="stat-label" th:text="#{fine.metrics.waived}">Waived</div>
                <div class="stat-value" th:text="${waivedCount}">0</div>
            </article>
        </section>

        <section class="panel">
            <div class="table-toolbar">
                <div>
                    <h2 class="section-title" th:text="#{fine.filter}">Fine Filter</h2>
                    <span class="hint" th:text="#{fine.keyword.placeholder}">Reader / book / reason</span>
                </div>
                <form class="reservation-filter" th:action="@{/fines}" method="get">
                    <select class="layui-select" name="status">
                        <option value="" th:selected="${status == null}" th:text="#{fine.status.all}">All statuses</option>
                        <option th:each="item : ${statuses}"
                                th:value="${item.name()}"
                                th:selected="${status != null and status == item}"
                                th:text="${#messages.msg('fineStatus.' + item.name())}"></option>
                    </select>
                    <input class="layui-input" name="keyword" th:value="${keyword}" th:placeholder="#{fine.keyword.placeholder}">
                    <button class="layui-btn" type="submit" th:text="#{common.search}">Search</button>
                    <a class="layui-btn layui-btn-primary" th:href="@{/fines}" th:text="#{common.reset}">Reset</a>
                </form>
            </div>

            <table class="layui-table responsive-table">
                <thead>
                <tr>
                    <th th:text="#{borrow.reader}">Reader</th>
                    <th th:text="#{borrow.book}">Book</th>
                    <th th:text="#{fine.reason}">Reason</th>
                    <th th:text="#{fine.amount}">Amount</th>
                    <th th:text="#{common.status}">Status</th>
                    <th th:text="#{fine.paidAt}">Paid At</th>
                    <th th:text="#{common.operation}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="fine : ${fines.content}">
                    <td>
                        <strong th:text="${fine.reader.readerNo + ' ' + fine.reader.name}">Reader</strong>
                        <span class="reservation-subtext" th:text="${fine.reader.phone ?: fine.reader.email}">Contact</span>
                    </td>
                    <td>
                        <strong th:text="${fine.borrowRecord != null ? fine.borrowRecord.book.title : '-'}">Book</strong>
                        <span class="reservation-subtext" th:if="${fine.borrowRecord != null}" th:text="${fine.borrowRecord.book.isbn}">ISBN</span>
                    </td>
                    <td th:text="${fine.reason}">Reason</td>
                    <td th:text="${fine.amount}">0.00</td>
                    <td>
                        <span class="fine-status"
                              th:classappend="${' status-' + fine.status.name().toLowerCase()}"
                              th:text="${#messages.msg('fineStatus.' + fine.status.name())}">Status</span>
                    </td>
                    <td th:text="${fine.paidAt == null ? '-' : #temporals.format(fine.paidAt, 'yyyy-MM-dd HH:mm')}">-</td>
                    <td class="table-actions">
                        <form th:if="${fine.status.name() == 'UNPAID'}" th:action="@{/fines/{id}/pay(id=${fine.id})}" method="post" sec:authorize="hasAuthority('FINE_PAY')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs" type="submit" th:text="#{common.pay}">Pay</button>
                        </form>
                        <form th:if="${fine.status.name() == 'UNPAID'}" th:action="@{/fines/{id}/waive(id=${fine.id})}" method="post" sec:authorize="hasAuthority('FINE_WAIVE')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-primary" type="submit" th:text="#{common.waive}">Waive</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="empty-result" th:if="${fines.totalElements == 0}" th:text="#{fine.empty}">No fine records found.</div>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${fines.hasPrevious()}" th:href="@{|/fines?page=${fines.number - 1}${queryString}|}" th:text="#{common.previous}">Previous</a>
                <span th:text="|${fines.number + 1} / ${fines.totalPages == 0 ? 1 : fines.totalPages}|">1 / 1</span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${fines.hasNext()}" th:href="@{|/fines?page=${fines.number + 1}${queryString}|}" th:text="#{common.next}">Next</a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
