<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{fine.title} - #{app.name}|">罚款管理 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="#{fine.title}">罚款管理</h1>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <table class="layui-table">
                <thead><tr><th th:text="#{borrow.reader}">读者</th><th th:text="#{borrow.book}">图书</th><th th:text="#{fine.reason}">原因</th><th th:text="#{fine.amount}">金额</th><th th:text="#{common.status}">状态</th><th th:text="#{fine.paidAt}">缴纳时间</th><th th:text="#{common.operation}">操作</th></tr></thead>
                <tbody>
                <tr th:each="fine : ${fines.content}">
                    <td th:text="${fine.reader.readerNo + ' ' + fine.reader.name}"></td>
                    <td th:text="${fine.borrowRecord != null ? fine.borrowRecord.book.title : '-'}"></td>
                    <td th:text="${fine.reason}"></td>
                    <td th:text="${fine.amount}"></td>
                    <td th:text="${#messages.msg('fineStatus.' + fine.status.name())}"></td>
                    <td th:text="${fine.paidAt == null ? '-' : #temporals.format(fine.paidAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td class="table-actions">
                        <form th:if="${fine.status.name() == 'UNPAID'}" th:action="@{/fines/{id}/pay(id=${fine.id})}" method="post" sec:authorize="hasAuthority('FINE_PAY')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs" type="submit" th:text="#{common.pay}">缴纳</button>
                        </form>
                        <form th:if="${fine.status.name() == 'UNPAID'}" th:action="@{/fines/{id}/waive(id=${fine.id})}" method="post" sec:authorize="hasAuthority('FINE_WAIVE')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-primary" type="submit" th:text="#{common.waive}">减免</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
