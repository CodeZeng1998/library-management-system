<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<aside class="sidebar" th:fragment="sidebar">
    <div class="brand" th:text="#{app.name}">Library Management System</div>
    <details class="sidebar-settings">
        <summary class="settings-button">
            <i class="settings-icon" data-lucide="settings" aria-hidden="true"></i>
            <span th:text="#{settings.label}">Settings</span>
        </summary>
        <div class="settings-menu">
            <div class="theme-panel">
                <label class="theme-label" for="themeMode" th:text="#{theme.label}">Theme</label>
                <select id="themeMode" class="theme-switcher" aria-label="Theme mode">
                    <option value="auto" th:text="#{theme.auto}">Auto</option>
                    <option value="light" th:text="#{theme.light}">Light</option>
                    <option value="dark" th:text="#{theme.dark}">Dark</option>
                    <option value="eye" th:text="#{theme.eye}">Eye Comfort</option>
                </select>
            </div>
            <div class="theme-panel">
                <label class="theme-label" for="localeMode" th:text="#{language.label}">Language</label>
                <select id="localeMode" class="theme-switcher" aria-label="Language" th:data-current-locale="${#locale.toString()}">
                    <option value="zh_CN" th:text="#{language.zh_CN}">Simplified Chinese</option>
                    <option value="zh_TW" th:text="#{language.zh_TW}">Traditional Chinese</option>
                    <option value="en" th:text="#{language.en}">English</option>
                </select>
            </div>
            <div class="theme-panel">
                <label class="theme-label" for="densityMode" th:text="#{density.label}">Density</label>
                <select id="densityMode" class="theme-switcher" aria-label="Information density">
                    <option value="compact" th:text="#{density.compact}">Compact</option>
                    <option value="comfortable" th:text="#{density.comfortable}">Comfortable</option>
                </select>
            </div>
        </div>
    </details>
    <a class="nav-link" th:href="@{/}" sec:authorize="hasAuthority('DASHBOARD_VIEW')"><i class="nav-icon" data-lucide="layout-dashboard" aria-hidden="true"></i><span th:text="#{nav.dashboard}">Dashboard</span></a>
    <a class="nav-link" th:href="@{/portal}" sec:authorize="hasAuthority('ROLE_READER')"><i class="nav-icon" data-lucide="door-open" aria-hidden="true"></i><span th:text="#{nav.portal}">Reader Portal</span></a>
    <a class="nav-link" th:href="@{/recommendations}" sec:authorize="hasAuthority('RECOMMENDATION_VIEW')"><i class="nav-icon" data-lucide="sparkles" aria-hidden="true"></i><span th:text="#{nav.recommendations}">Recommendations</span></a>
    <a class="nav-link" th:href="@{/books}" sec:authorize="hasAuthority('BOOK_VIEW')"><i class="nav-icon" data-lucide="book-open" aria-hidden="true"></i><span th:text="#{nav.books}">Books</span></a>
    <a class="nav-link" th:href="@{/readers}" sec:authorize="hasAuthority('READER_VIEW')"><i class="nav-icon" data-lucide="users" aria-hidden="true"></i><span th:text="#{nav.readers}">Readers</span></a>
    <a class="nav-link" th:href="@{/borrow}" sec:authorize="hasAuthority('BORROW_MANAGE')"><i class="nav-icon" data-lucide="scan-line" aria-hidden="true"></i><span th:text="#{nav.borrow}">Circulation</span></a>
    <a class="nav-link" th:href="@{/reservations}" sec:authorize="hasAuthority('RESERVATION_MANAGE')"><i class="nav-icon" data-lucide="calendar-clock" aria-hidden="true"></i><span th:text="#{nav.reservations}">Reservations</span></a>
    <a class="nav-link" th:href="@{/notifications}" sec:authorize="hasAuthority('NOTIFICATION_VIEW')"><i class="nav-icon" data-lucide="bell" aria-hidden="true"></i><span th:text="#{nav.notifications}">Messages</span></a>
    <a class="nav-link" th:href="@{/fines}" sec:authorize="hasAuthority('FINE_VIEW')"><i class="nav-icon" data-lucide="badge-dollar-sign" aria-hidden="true"></i><span th:text="#{nav.fines}">Fines</span></a>
    <a class="nav-link" th:href="@{/users}" sec:authorize="hasAuthority('USER_MANAGE')"><i class="nav-icon" data-lucide="shield" aria-hidden="true"></i><span th:text="#{nav.users}">Users</span></a>
    <a class="nav-link" th:href="@{/categories}" sec:authorize="hasAuthority('CATEGORY_MANAGE')"><i class="nav-icon" data-lucide="folder-tree" aria-hidden="true"></i><span th:text="#{nav.categories}">Categories</span></a>
    <a class="nav-link" th:href="@{/tags}" sec:authorize="hasAuthority('TAG_MANAGE')"><i class="nav-icon" data-lucide="tags" aria-hidden="true"></i><span th:text="#{nav.tags}">Tags</span></a>
    <a class="nav-link" th:href="@{/system/configs}" sec:authorize="hasAuthority('CONFIG_MANAGE')"><i class="nav-icon" data-lucide="settings-2" aria-hidden="true"></i><span th:text="#{nav.configs}">System Config</span></a>
    <a class="nav-link" th:href="@{/system/logs}" sec:authorize="hasAuthority('LOG_VIEW')"><i class="nav-icon" data-lucide="book-copy" aria-hidden="true"></i><span th:text="#{nav.logs}">Operation Logs</span></a>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/i18n.js}"></script>
    <script th:src="@{/js/density.js}"></script>
    <script th:src="@{/js/form-guard.js}"></script>
    <script th:src="@{/js/ui-polish.js}"></script>
</aside>
</body>
</html>
