<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图书表单 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="${book.id == null ? '新增图书' : '编辑图书'}">图书表单</h1>
            <a class="layui-btn layui-btn-primary" th:href="@{/books}">返回</a>
        </div>
        <section class="panel">
            <form class="layui-form" th:action="@{/books}" th:object="${book}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{id}">
                <div class="form-grid">
                    <div><label>书名</label><input class="layui-input" th:field="*{title}" required></div>
                    <div><label>ISBN</label><input class="layui-input" th:field="*{isbn}" required></div>
                    <div><label>作者</label><input class="layui-input" th:field="*{author}" required></div>
                    <div><label>出版社</label><input class="layui-input" th:field="*{publisher}" required></div>
                    <div>
                        <label>分类</label>
                        <select name="categoryId">
                            <option value="">未分类</option>
                            <option th:each="category : ${categories}" th:value="${category.id}" th:selected="${book.category != null and book.category.id == category.id}" th:text="${category.name}"></option>
                        </select>
                    </div>
                    <div><label>存放位置</label><input class="layui-input" th:field="*{location}"></div>
                    <div><label>馆藏数量</label><input class="layui-input" type="number" min="0" th:field="*{totalQuantity}" required></div>
                    <div><label>可借数量</label><input class="layui-input" type="number" min="0" th:field="*{availableQuantity}" required></div>
                    <div><label>出版日期</label><input class="layui-input" type="date" th:field="*{publishDate}"></div>
                    <div><label>定价</label><input class="layui-input" type="number" step="0.01" min="0" th:field="*{price}"></div>
                    <div><label>页数</label><input class="layui-input" type="number" min="0" th:field="*{pages}"></div>
                    <div><label>装帧</label><input class="layui-input" th:field="*{binding}"></div>
                    <div class="form-full"><label>简介</label><textarea class="layui-textarea" th:field="*{summary}"></textarea></div>
                    <div><input type="checkbox" th:field="*{referenceOnly}" title="仅限馆内阅读"></div>
                </div>
                <div style="margin-top: 18px;">
                    <button class="layui-btn" type="submit">保存</button>
                </div>
            </form>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
