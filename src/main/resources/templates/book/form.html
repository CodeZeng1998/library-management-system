<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{book.form.title} - #{app.name}|">图书表单 - 图书管理系统</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="${book.id == null ? #messages.msg('book.form.add') : #messages.msg('book.form.edit')}">图书表单</h1>
            <a class="layui-btn layui-btn-primary" th:href="@{/books}" th:text="#{common.back}">返回</a>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <form class="layui-form" th:action="@{/books}" th:object="${book}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{id}">
                <div class="form-section">
                    <h2 th:text="#{book.form.basicInfo}">基本信息</h2>
                    <div class="form-grid compact-form-grid">
                        <div><label th:text="#{book.isbn}">ISBN</label><input class="layui-input" th:field="*{isbn}" required></div>
                        <div><label th:text="#{book.title}">书名</label><input class="layui-input" th:field="*{title}" required></div>
                        <div><label th:text="#{book.author}">作者</label><input class="layui-input" th:field="*{author}" required></div>
                        <div><label th:text="#{book.publisher}">出版社</label><input class="layui-input" th:field="*{publisher}" required></div>
                    </div>
                </div>
                <div class="form-section">
                    <h2 th:text="#{book.form.collectionInfo}">馆藏信息</h2>
                    <div class="form-grid compact-form-grid">
                        <div>
                            <label th:text="#{book.category}">分类</label>
                            <select name="categoryId">
                                <option value="" th:text="#{common.unclassified}">未分类</option>
                                <option th:each="category : ${categories}" th:value="${category.id}" th:selected="${book.category != null and book.category.id == category.id}" th:text="${@localizedTextService.categoryName(category)}"></option>
                            </select>
                        </div>
                        <div class="form-full">
                            <label th:text="#{book.tags}">Tags</label>
                            <div class="category-checks">
                                <label th:each="tag : ${tags}">
                                    <input type="checkbox" name="tagIds" th:value="${tag.id}" th:checked="${book.tags.contains(tag)}">
                                    <span th:text="${tag.name}">Tag</span>
                                </label>
                            </div>
                            <input class="layui-input" name="tagNames" th:placeholder="#{book.tags.placeholder}">
                        </div>
                        <div><label th:text="#{book.location.storage}">存放位置</label><input class="layui-input" th:field="*{location}"></div>
                        <div><label th:text="#{book.totalQuantity}">馆藏数量</label><input class="layui-input" type="number" min="0" th:field="*{totalQuantity}" required></div>
                        <div><label th:text="#{book.availableQuantity}">可借数量</label><input class="layui-input" type="number" min="0" th:field="*{availableQuantity}" required></div>
                        <div><input type="checkbox" th:field="*{referenceOnly}" th:title="#{book.referenceOnly}"></div>
                    </div>
                </div>
                <details class="form-section collapsible-form-section">
                    <summary th:text="#{book.form.extendedInfo}">扩展信息</summary>
                    <div class="form-grid compact-form-grid">
                        <div><label th:text="#{book.subtitle}">副标题</label><input class="layui-input" th:field="*{subtitle}"></div>
                        <div><label th:text="#{book.translator}">译者</label><input class="layui-input" th:field="*{translator}"></div>
                        <div><label th:text="#{book.publishDate}">出版日期</label><input class="layui-input" type="date" th:field="*{publishDate}"></div>
                        <div><label th:text="#{book.price}">定价</label><input class="layui-input" type="number" step="0.01" min="0" th:field="*{price}"></div>
                        <div><label th:text="#{book.pages}">页数</label><input class="layui-input" type="number" min="0" th:field="*{pages}"></div>
                        <div><label th:text="#{book.binding}">装帧</label><input class="layui-input" th:field="*{binding}"></div>
                        <div class="form-full"><label th:text="#{book.summary}">简介</label><textarea class="layui-textarea" th:field="*{summary}"></textarea></div>
                    </div>
                </details>
                <div style="margin-top: 18px;">
                    <button class="layui-btn" type="submit" th:text="#{common.save}">保存</button>
                </div>
            </form>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
