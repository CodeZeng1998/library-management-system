<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图书管理 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title">图书管理</h1>
            <a class="layui-btn" th:href="@{/books/new}">新增图书</a>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <form class="table-toolbar" th:action="@{/books}" method="get">
                <input class="layui-input" style="max-width: 360px;" name="keyword" th:value="${keyword}" placeholder="书名 / 作者 / ISBN">
                <button class="layui-btn layui-btn-primary" type="submit">搜索</button>
            </form>
            <table class="layui-table">
                <thead><tr><th>书名</th><th>ISBN</th><th>作者</th><th>分类</th><th>库存</th><th>位置</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="book : ${books.content}">
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.category != null ? book.category.name : '-'}"></td>
                    <td th:text="${book.availableQuantity + '/' + book.totalQuantity}"></td>
                    <td th:text="${book.location}"></td>
                    <td class="table-actions">
                        <a class="layui-btn layui-btn-xs" th:href="@{/books/{id}/edit(id=${book.id})}">编辑</a>
                        <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post" onsubmit="return confirm('确认删除该图书？')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-danger" type="submit">删除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${books.hasPrevious()}" th:href="@{/books(page=${books.number - 1}, keyword=${keyword})}">上一页</a>
                <span th:text="|${books.number + 1} / ${books.totalPages == 0 ? 1 : books.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${books.hasNext()}" th:href="@{/books(page=${books.number + 1}, keyword=${keyword})}">下一页</a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
