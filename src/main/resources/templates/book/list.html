<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{book.search.title} - #{app.name}|">图书检索 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="#{book.search.title}">图书检索</h1>
            <div class="table-actions">
                <a class="layui-btn layui-btn-primary" th:href="@{/books/export}" sec:authorize="hasAuthority('BOOK_VIEW')" th:text="#{common.exportCsv}">导出CSV</a>
                <a class="layui-btn" th:href="@{/books/new}" sec:authorize="hasAuthority('BOOK_EDIT')" th:text="#{book.add}">新增图书</a>
            </div>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <section class="panel search-builder">
            <form id="bookSearchForm" th:action="@{/books}" method="get">
                <input type="hidden" name="size" th:value="${pageSize}">
                <div class="quick-search-row">
                    <label class="quick-search">
                        <span th:text="#{book.quickSearch}">快速搜索</span>
                        <input class="layui-input" name="keyword" list="bookSuggestions" th:value="${criteria.keyword}" th:placeholder="#{book.quickSearch.placeholder}">
                    </label>
                    <button class="layui-btn" type="submit" th:text="#{common.search}">搜索</button>
                    <a class="layui-btn layui-btn-primary" th:href="@{/books}" th:text="#{common.reset}">重置</a>
                </div>

                <datalist id="bookSuggestions">
                    <option th:each="suggestion : ${suggestions}" th:value="${suggestion}"></option>
                </datalist>

                <details class="advanced-search" th:open="${criteria.title != null || criteria.author != null || !criteria.categoryIds.isEmpty() || criteria.publishYearFrom != null || criteria.publishYearTo != null || criteria.availableOnly || criteria.location != null}">
                    <summary th:text="#{book.advancedSearch}">高级检索</summary>
                    <div class="advanced-grid">
                        <label class="condition-row">
                            <span th:text="#{book.title}">书名</span>
                            <select name="titleMatch" class="layui-select">
                                <option value="contains" th:selected="${criteria.titleMatch == 'contains'}" th:text="#{search.contains}">包含</option>
                                <option value="exact" th:selected="${criteria.titleMatch == 'exact'}" th:text="#{search.exact}">精确</option>
                            </select>
                            <input class="layui-input" name="title" list="bookSuggestions" th:value="${criteria.title}" th:placeholder="#{search.inputTitle}">
                        </label>
                        <label class="condition-row">
                            <span th:text="#{book.author}">作者</span>
                            <select name="authorMatch" class="layui-select">
                                <option value="contains" th:selected="${criteria.authorMatch == 'contains'}" th:text="#{search.contains}">包含</option>
                                <option value="exact" th:selected="${criteria.authorMatch == 'exact'}" th:text="#{search.exact}">精确</option>
                            </select>
                            <input class="layui-input" name="author" list="bookSuggestions" th:value="${criteria.author}" th:placeholder="#{search.inputAuthor}">
                        </label>
                        <div class="condition-row category-condition">
                            <span th:text="#{book.category}">分类</span>
                            <div class="category-checks">
                                <label th:each="category : ${categories}">
                                    <input type="checkbox" name="categoryIds" th:value="${category.id}" th:checked="${criteria.categoryIds.contains(category.id)}">
                                    <span th:text="${@localizedTextService.categoryName(category)}"></span>
                                </label>
                            </div>
                        </div>
                        <div class="condition-row year-condition">
                            <span th:text="#{book.publishYear}">出版年份</span>
                            <input class="layui-input" type="number" name="publishYearFrom" min="1900" max="2100" th:value="${criteria.publishYearFrom}" th:placeholder="#{search.from}">
                            <em th:text="#{search.to}">至</em>
                            <input class="layui-input" type="number" name="publishYearTo" min="1900" max="2100" th:value="${criteria.publishYearTo}" th:placeholder="#{search.to}">
                        </div>
                        <label class="condition-row">
                            <span th:text="#{book.location}">馆藏地</span>
                            <select class="layui-select" name="location">
                                <option value="" th:text="#{search.allLocations}">全部馆藏地</option>
                                <option th:each="location : ${locations}" th:value="${location}" th:text="${location}" th:selected="${criteria.location == location}"></option>
                            </select>
                        </label>
                        <label class="availability-filter">
                            <input type="checkbox" name="availableOnly" value="true" th:checked="${criteria.availableOnly}">
                            <span th:text="#{book.availableOnly}">仅显示有库存</span>
                        </label>
                    </div>
                </details>

                <div class="search-options">
                    <fieldset class="option-group">
                        <legend th:text="#{search.sort}">排序</legend>
                        <label><input type="radio" name="sort" value="relevance" th:checked="${criteria.sort == 'relevance'}"> <span th:text="#{search.sort.relevance}">相关度</span></label>
                        <label><input type="radio" name="sort" value="publishDateDesc" th:checked="${criteria.sort == 'publishDateDesc'}"> <span th:text="#{search.sort.publishDateDesc}">出版时间↓</span></label>
                        <label><input type="radio" name="sort" value="publishDateAsc" th:checked="${criteria.sort == 'publishDateAsc'}"> <span th:text="#{search.sort.publishDateAsc}">出版时间↑</span></label>
                        <label><input type="radio" name="sort" value="borrowHot" th:checked="${criteria.sort == 'borrowHot'}"> <span th:text="#{search.sort.borrowHot}">借阅热度</span></label>
                        <label><input type="radio" name="sort" value="titleAsc" th:checked="${criteria.sort == 'titleAsc'}"> <span th:text="#{search.sort.titleAsc}">书名A-Z</span></label>
                    </fieldset>
                    <fieldset class="option-group">
                        <legend th:text="#{search.view}">视图</legend>
                        <label><input type="radio" name="view" value="card" th:checked="${criteria.view == 'card'}"> <span th:text="#{search.view.card}">卡片</span></label>
                        <label><input type="radio" name="view" value="list" th:checked="${criteria.view == 'list'}"> <span th:text="#{search.view.list}">列表</span></label>
                        <label><input type="radio" name="view" value="detail" th:checked="${criteria.view == 'detail'}"> <span th:text="#{search.view.detail}">详细</span></label>
                    </fieldset>
                    <button class="layui-btn layui-btn-primary" type="button" id="saveBookSearch" th:text="#{search.saveFavorite}">保存为常用检索</button>
                </div>
            </form>

            <div class="saved-searches">
                <div>
                    <strong th:text="#{search.history}">检索历史</strong>
                    <div class="search-chip-row" id="bookSearchHistory"></div>
                </div>
                <div>
                    <strong th:text="#{search.favorite}">常用检索</strong>
                    <div class="search-chip-row" id="bookSearchFavorites"></div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="table-toolbar">
                <h2 class="section-title" th:text="#{book.resultCount(${books.totalElements})}">检索结果</h2>
                <span class="hint" th:text="#{book.pinyinHint}">快速搜索支持分类拼音首字母，例如输入 jsj 可匹配“计算机”。</span>
            </div>

            <div class="book-card-grid" th:if="${criteria.view == 'card'}">
                <article class="book-card" th:each="book : ${books.content}">
                    <div class="book-cover">
                        <img th:if="${book.coverUrl != null and !#strings.isEmpty(book.coverUrl)}" th:src="${book.coverUrl}" th:alt="${book.title}">
                        <span th:if="${book.coverUrl == null or #strings.isEmpty(book.coverUrl)}" th:text="${#strings.abbreviate(book.title, 8)}"></span>
                    </div>
                    <div class="book-card-body">
                        <h3 th:text="${book.title}"></h3>
                        <p th:text="${book.author}"></p>
                        <div class="book-meta">
                            <span th:text="${book.category != null ? @localizedTextService.categoryName(book.category) : #messages.msg('common.unclassified')}"></span>
                            <span th:text="${book.publishDate != null ? #temporals.format(book.publishDate, 'yyyy') : #messages.msg('book.yearUnknown')}"></span>
                        </div>
                        <div class="availability" th:classappend="${book.availableQuantity > 0 ? ' available' : ' unavailable'}" th:text="${book.availableQuantity > 0 ? #messages.msg('book.available', book.availableQuantity, book.totalQuantity) : #messages.msg('book.unavailable')}"></div>
                        <div class="book-location" th:text="${book.location ?: #messages.msg('book.locationUnknown')}"></div>
                        <a class="layui-btn layui-btn-xs" th:href="@{/books/{id}/edit(id=${book.id})}" sec:authorize="hasAuthority('BOOK_EDIT')" th:text="#{common.edit}">编辑</a>
                    </div>
                </article>
            </div>

            <table class="layui-table responsive-table" th:if="${criteria.view == 'list'}">
                <thead><tr><th th:text="#{book.title}">书名</th><th th:text="#{book.isbn}">ISBN</th><th th:text="#{book.author}">作者</th><th th:text="#{book.category}">分类</th><th th:text="#{book.publishYear}">出版年份</th><th th:text="#{book.inventory}">库存</th><th th:text="#{book.location}">位置</th><th th:text="#{common.operation}">操作</th></tr></thead>
                <tbody>
                <tr th:each="book : ${books.content}">
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.category != null ? @localizedTextService.categoryName(book.category) : '-'}"></td>
                    <td th:text="${book.publishDate != null ? #temporals.format(book.publishDate, 'yyyy') : '-'}"></td>
                    <td th:text="${book.availableQuantity + '/' + book.totalQuantity}"></td>
                    <td th:text="${book.location}"></td>
                    <td class="table-actions">
                        <a class="layui-btn layui-btn-xs" th:href="@{/books/{id}/edit(id=${book.id})}" sec:authorize="hasAuthority('BOOK_EDIT')" th:text="#{common.edit}">编辑</a>
                        <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post" th:attr="onsubmit=|return confirm('#{book.confirmDelete}')|" sec:authorize="hasAuthority('BOOK_DELETE')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-danger" type="submit" th:text="#{common.delete}">删除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="book-detail-list" th:if="${criteria.view == 'detail'}">
                <article class="book-detail-item" th:each="book : ${books.content}">
                    <div class="book-cover">
                        <img th:if="${book.coverUrl != null and !#strings.isEmpty(book.coverUrl)}" th:src="${book.coverUrl}" th:alt="${book.title}">
                        <span th:if="${book.coverUrl == null or #strings.isEmpty(book.coverUrl)}" th:text="${#strings.abbreviate(book.title, 8)}"></span>
                    </div>
                    <div>
                        <h3 th:text="${book.title}"></h3>
                        <dl class="detail-meta">
                            <div><dt th:text="#{book.author}">作者</dt><dd th:text="${book.author}"></dd></div>
                            <div><dt th:text="#{book.isbn}">ISBN</dt><dd th:text="${book.isbn}"></dd></div>
                            <div><dt th:text="#{book.publisher}">出版社</dt><dd th:text="${book.publisher}"></dd></div>
                            <div><dt th:text="#{book.category}">分类</dt><dd th:text="${book.category != null ? @localizedTextService.categoryName(book.category) : '-'}"></dd></div>
                            <div><dt th:text="#{book.publishDate}">出版日期</dt><dd th:text="${book.publishDate ?: '-'}"></dd></div>
                            <div><dt th:text="#{book.borrowHot}">借阅热度</dt><dd th:text="${book.borrowCount}"></dd></div>
                            <div><dt th:text="#{book.availableQuantity}">可借库存</dt><dd th:text="${book.availableQuantity + '/' + book.totalQuantity}"></dd></div>
                            <div><dt th:text="#{book.location}">馆藏地</dt><dd th:text="${book.location ?: '-'}"></dd></div>
                        </dl>
                        <p class="book-summary" th:text="${book.summary ?: #messages.msg('book.noSummary')}"></p>
                        <a class="layui-btn layui-btn-xs" th:href="@{/books/{id}/edit(id=${book.id})}" sec:authorize="hasAuthority('BOOK_EDIT')" th:text="#{common.edit}">编辑</a>
                    </div>
                </article>
            </div>

            <div class="empty-result" th:if="${books.totalElements == 0}">
                <span th:text="#{book.noResult}">没有找到符合条件的图书，请减少筛选条件后重试。</span>
            </div>

            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${books.hasPrevious()}" th:href="@{|/books?page=${books.number - 1}${queryString}|}" th:text="#{common.previous}">上一页</a>
                <span th:text="|${books.number + 1} / ${books.totalPages == 0 ? 1 : books.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${books.hasNext()}" th:href="@{|/books?page=${books.number + 1}${queryString}|}" th:text="#{common.next}">下一页</a>
            </div>
        </section>

        <section class="panel" sec:authorize="hasAuthority('BOOK_IMPORT')">
            <form class="import-bar" th:action="@{/books/import/preview}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input class="layui-input" type="file" name="file" accept=".csv" required>
                <a class="layui-btn layui-btn-primary" th:href="@{/books/import/template}">Download template</a>
                <a class="layui-btn layui-btn-primary" th:href="@{/books/import/errors}">Error report</a>
                <button class="layui-btn" type="submit" th:text="#{common.import}">批量导入</button>
                <span class="hint" th:text="#{book.csvHint}">CSV列：ISBN,书名,作者,出版社,分类,总库存,可借库存,位置,价格</span>
            </form>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
<script th:src="@{/js/book-search.js}"></script>
</body>
</html>
