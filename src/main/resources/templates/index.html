<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数据看板 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title">数据看板</h1>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <span sec:authentication="name"></span>
                <button class="layui-btn layui-btn-sm layui-btn-primary" type="submit">退出</button>
            </form>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="stat-grid">
            <div class="stat-card"><div class="stat-label">馆藏图书</div><div class="stat-value" th:text="${bookCount}">0</div></div>
            <div class="stat-card"><div class="stat-label">注册读者</div><div class="stat-value" th:text="${readerCount}">0</div></div>
            <div class="stat-card"><div class="stat-label">在借数量</div><div class="stat-value" th:text="${activeBorrowCount}">0</div></div>
            <div class="stat-card"><div class="stat-label">预约记录</div><div class="stat-value" th:text="${reservationCount}">0</div></div>
        </section>
        <section class="panel" style="margin-top: 18px;">
            <h2 style="font-size:18px; margin:0 0 12px;">借阅排行</h2>
            <table class="layui-table">
                <thead><tr><th>书名</th><th>作者</th><th>ISBN</th><th>借阅次数</th></tr></thead>
                <tbody>
                <tr th:each="book : ${topBooks}">
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.borrowCount}"></td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
