<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{user.list.title} - #{app.name}|">User Management - Library Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="#{user.list.title}">User Management</h1>
            <a class="layui-btn" th:href="@{/users/new}" th:text="#{user.add}">Add User</a>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <div class="table-toolbar">
                <div>
                    <h2 class="section-title" th:text="#{user.list.title}">User Management</h2>
                    <span class="hint" th:text="#{user.keyword.placeholder}">Username / email / nickname / phone</span>
                </div>
                <form class="admin-filter" th:action="@{/users}" method="get">
                    <select class="layui-select" name="role">
                        <option value="" th:selected="${role == null}" th:text="#{user.role.all}">All roles</option>
                        <option th:each="item : ${roles}"
                                th:value="${item.name()}"
                                th:selected="${role != null and role == item}"
                                th:text="${#messages.msg('role.' + item.name())}"></option>
                    </select>
                    <select class="layui-select" name="status">
                        <option value="" th:selected="${status == null}" th:text="#{user.status.all}">All statuses</option>
                        <option th:each="item : ${accountStatuses}"
                                th:value="${item.name()}"
                                th:selected="${status != null and status == item}"
                                th:text="${#messages.msg('status.' + item.name())}"></option>
                    </select>
                    <input class="layui-input" name="keyword" th:value="${keyword}" th:placeholder="#{user.keyword.placeholder}">
                    <button class="layui-btn" type="submit" th:text="#{common.search}">Search</button>
                    <a class="layui-btn layui-btn-primary" th:href="@{/users}" th:text="#{common.reset}">Reset</a>
                </form>
            </div>
            <table class="layui-table responsive-table">
                <thead>
                <tr>
                    <th th:text="#{user.username}">Username</th>
                    <th th:text="#{user.email}">Email</th>
                    <th th:text="#{user.nickname}">Nickname</th>
                    <th th:text="#{user.role}">Role</th>
                    <th>Data scope</th>
                    <th>Extra permissions</th>
                    <th th:text="#{user.status}">Status</th>
                    <th th:text="#{user.lastLogin}">Last Login</th>
                    <th th:text="#{common.operation}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users.content}">
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.nickname}"></td>
                    <td th:text="${#messages.msg('role.' + user.role.name())}"></td>
                    <td th:text="${user.managedLocationPrefix ?: '-'}"></td>
                    <td th:text="${user.permissionCodes ?: '-'}"></td>
                    <td><span class="status-chip" th:classappend="${' status-' + user.status.name().toLowerCase()}" th:text="${#messages.msg('status.' + user.status.name())}"></span></td>
                    <td th:text="${user.lastLoginTime == null ? '-' : #temporals.format(user.lastLoginTime, 'yyyy-MM-dd HH:mm')}"></td>
                    <td class="table-actions">
                        <a class="layui-btn layui-btn-xs" th:href="@{/users/{id}/edit(id=${user.id})}" th:text="#{common.edit}">Edit</a>
                        <form th:if="${user.status.name() != 'DISABLED'}" th:action="@{/users/{id}/disable(id=${user.id})}" method="post" th:attr="onsubmit=|return confirm('#{user.confirmDisable}')|">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-primary" type="submit" th:text="#{common.disable}">Disable</button>
                        </form>
                        <form th:if="${user.status.name() == 'DISABLED'}" th:action="@{/users/{id}/enable(id=${user.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs" type="submit" th:text="#{common.enable}">Enable</button>
                        </form>
                        <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" th:attr="onsubmit=|return confirm('#{user.confirmDelete}')|">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-danger" type="submit" th:text="#{common.delete}">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="empty-result" th:if="${users.totalElements == 0}" th:text="#{user.empty}">No users found.</div>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${users.hasPrevious()}" th:href="@{|/users?page=${users.number - 1}${queryString}|}" th:text="#{common.previous}">Previous</a>
                <span th:text="|${users.number + 1} / ${users.totalPages == 0 ? 1 : users.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${users.hasNext()}" th:href="@{|/users?page=${users.number + 1}${queryString}|}" th:text="#{common.next}">Next</a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
