<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{user.form.title} - #{app.name}|">用户表单 - 图书管理系统</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="${user.id == null ? #messages.msg('user.form.add') : #messages.msg('user.form.edit')}">用户表单</h1>
            <a class="layui-btn layui-btn-primary" th:href="@{/users}" th:text="#{common.back}">返回</a>
        </div>
        <section class="panel">
            <form class="layui-form" th:action="@{/users}" th:object="${user}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{id}">
                <div class="form-grid">
                    <div><label th:text="#{user.username}">账号</label><input class="layui-input" th:field="*{username}" required></div>
                    <div><label th:text="#{user.email}">邮箱</label><input class="layui-input" type="email" th:field="*{email}" required></div>
                    <div><label th:text="#{user.nickname}">昵称</label><input class="layui-input" th:field="*{nickname}" required></div>
                    <div><label th:text="#{user.phone}">联系电话</label><input class="layui-input" th:field="*{phone}"></div>
                    <div><label th:text="#{user.password}">密码</label><input class="layui-input" type="password" name="rawPassword" th:placeholder="#{user.password.placeholder}"></div>
                    <div>
                        <label th:text="#{user.role}">角色</label>
                        <select th:field="*{role}">
                            <option th:each="role : ${roles}" th:value="${role}" th:text="${#messages.msg('role.' + role.name())}"></option>
                        </select>
                    </div>
                    <div>
                        <label th:text="#{user.status}">状态</label>
                        <select th:field="*{status}">
                            <option th:each="status : ${accountStatuses}" th:value="${status}" th:text="${#messages.msg('status.' + status.name())}"></option>
                        </select>
                    </div>
                    <div class="form-full">
                        <label>Managed location prefix</label>
                        <input class="layui-input" th:field="*{managedLocationPrefix}" placeholder="For branch librarians, for example: Main Library or Branch A">
                    </div>
                    <div class="form-full">
                        <label>Additional permissions</label>
                        <div class="permission-checks">
                            <label th:each="permission : ${permissions}">
                                <input type="checkbox"
                                       name="permissionCodes"
                                       th:value="${permission.name()}"
                                       th:checked="${selectedPermissionCodes.contains(permission.name())}">
                                <span th:text="${permission.label}">Permission</span>
                                <em th:text="${permission.name()}">CODE</em>
                            </label>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 18px;">
                    <button class="layui-btn" type="submit" th:text="#{common.save}">保存</button>
                </div>
            </form>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
