<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{notification.title} - #{app.name}|">消息中心 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="#{notification.title}">消息中心</h1>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <table class="layui-table responsive-table">
                <thead><tr><th th:text="#{borrow.reader}">读者</th><th th:text="#{common.title}">标题</th><th th:text="#{common.content}">内容</th><th th:text="#{common.channel}">渠道</th><th th:text="#{common.status}">状态</th><th th:text="#{notification.sentAt}">发送时间</th><th th:text="#{common.operation}">操作</th></tr></thead>
                <tbody>
                <tr th:each="notification : ${notifications.content}">
                    <td th:text="${notification.reader.readerNo + ' ' + notification.reader.name}"></td>
                    <td th:text="${notification.title}"></td>
                    <td th:text="${notification.content}"></td>
                    <td th:text="${#messages.msg('notificationChannel.' + notification.channel.name())}"></td>
                    <td th:text="${#messages.msg('notificationStatus.' + notification.status.name())}"></td>
                    <td th:text="${#temporals.format(notification.sentAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <form th:if="${notification.status.name() == 'UNREAD'}" th:action="@{/notifications/{id}/read(id=${notification.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs" type="submit" th:text="#{common.markRead}">标为已读</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${notifications.hasPrevious()}" th:href="@{/notifications(page=${notifications.number - 1})}" th:text="#{common.previous}">上一页</a>
                <span th:text="|${notifications.number + 1} / ${notifications.totalPages == 0 ? 1 : notifications.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${notifications.hasNext()}" th:href="@{/notifications(page=${notifications.number + 1})}" th:text="#{common.next}">下一页</a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
