<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${importTitle}">CSV import preview</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="${importTitle}">CSV import preview</h1>
            <a class="layui-btn layui-btn-primary" th:href="${cancelUrl}">Back</a>
        </div>
        <section class="panel import-preview-summary">
            <div>
                <strong th:text="${result.summaryForPreview()}">Valid rows: 0, invalid rows: 0.</strong>
                <span class="hint">Review row-level validation before committing this import.</span>
            </div>
            <div class="table-actions">
                <a class="layui-btn layui-btn-primary" th:href="${templateUrl}">Download template</a>
                <a class="layui-btn layui-btn-primary" th:if="${result.failureCount > 0}" th:href="${errorReportUrl}">Download error report</a>
                <form th:action="${confirmUrl}" method="post" th:if="${result.failureCount == 0 and result.successCount > 0}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="layui-btn" type="submit">Confirm import</button>
                </form>
            </div>
        </section>
        <section class="panel">
            <table class="layui-table responsive-table">
                <thead>
                <tr>
                    <th>Row</th>
                    <th>Status</th>
                    <th>Message</th>
                    <th>Values</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${result.rows}" th:classappend="${row.success()} ? 'import-row-ok' : 'import-row-error'">
                    <td th:text="${row.rowNumber()}">2</td>
                    <td th:text="${row.success()} ? 'Ready' : 'Error'">Ready</td>
                    <td th:text="${row.message()}">Message</td>
                    <td th:text="${#strings.listJoin(row.values(), ' | ')}">Values</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
