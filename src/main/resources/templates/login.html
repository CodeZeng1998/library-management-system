<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<section class="login-panel">
    <h1 class="page-title">图书管理系统</h1>
    <form class="layui-form" th:action="@{/login}" method="post" style="margin-top: 22px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="layui-form-item">
            <label class="layui-form-label">账号</label>
            <div class="layui-input-block">
                <input class="layui-input" name="username" autocomplete="username" required>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">密码</label>
            <div class="layui-input-block">
                <input class="layui-input" name="password" type="password" autocomplete="current-password" required>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block">
                <input type="checkbox" name="remember-me" title="7 天免登录">
            </div>
        </div>
        <div class="alert alert-error" th:if="${param.error}">账号或密码错误，或账号状态不可登录。</div>
        <div class="alert alert-success" th:if="${param.logout}">已退出登录。</div>
        <button class="layui-btn layui-btn-fluid" type="submit">登录</button>
    </form>
    <p style="margin-top: 14px; color:#64748b;">默认账号：admin / admin123，librarian / librarian123</p>
</section>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
