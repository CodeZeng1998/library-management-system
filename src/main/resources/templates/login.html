<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{login.title} - #{app.name}|">登录 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">
<section class="login-panel">
    <div class="login-controls">
        <select id="localeMode" class="theme-switcher" aria-label="语言切换" th:data-current-locale="${#locale.toString()}">
            <option value="zh_CN" th:text="#{language.zh_CN}">简体中文</option>
            <option value="zh_TW" th:text="#{language.zh_TW}">繁體中文</option>
            <option value="en" th:text="#{language.en}">English</option>
        </select>
    </div>
    <h1 class="page-title" th:text="#{app.name}">图书管理系统</h1>
    <form class="layui-form" th:action="@{/login}" method="post" style="margin-top: 22px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="layui-form-item">
            <label class="layui-form-label" th:text="#{login.username}">账号</label>
            <div class="layui-input-block">
                <input class="layui-input" name="username" autocomplete="username" required>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label" th:text="#{login.password}">密码</label>
            <div class="layui-input-block">
                <input class="layui-input" name="password" type="password" autocomplete="current-password" required>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block">
                <input type="checkbox" name="remember-me" th:title="#{login.remember}">
            </div>
        </div>
        <div class="alert alert-error" th:if="${param.error}" th:text="#{login.error}">账号或密码错误，或账号状态不可登录。</div>
        <div class="alert alert-success" th:if="${param.logout}" th:text="#{login.logout}">已退出登录。</div>
        <button class="layui-btn layui-btn-fluid" type="submit" th:text="#{login.title}">登录</button>
    </form>
    <p class="hint" style="margin-top: 14px;" th:text="#{login.defaultAccounts}">默认账号：admin / admin123，librarian / librarian123</p>
</section>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
<script th:src="@{/js/theme.js}"></script>
<script th:src="@{/js/i18n.js}"></script>
</body>
</html>
