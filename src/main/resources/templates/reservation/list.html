<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{reservation.title} - #{app.name}|">预约管理 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="#{reservation.title}">预约管理</h1>
            <form th:action="@{/reservations/expire}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="layui-btn layui-btn-primary" type="submit" th:text="#{reservation.expireScan}">清理过期预约</button>
            </form>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <section class="dashboard-metrics reservation-metrics">
            <article class="stat-card">
                <div class="stat-label" th:text="#{reservation.metrics.waiting}">排队中</div>
                <div class="stat-value" th:text="${waitingCount}">0</div>
            </article>
            <article class="stat-card">
                <div class="stat-label" th:text="#{reservation.metrics.notified}">已通知</div>
                <div class="stat-value" th:text="${notifiedCount}">0</div>
            </article>
            <article class="stat-card">
                <div class="stat-label" th:text="#{reservation.metrics.expiringSoon}">12小时内到期</div>
                <div class="stat-value" th:text="${expiringSoonCount}">0</div>
            </article>
            <article class="stat-card">
                <div class="stat-label" th:text="#{reservation.metrics.expiredActive}">待清理过期</div>
                <div class="stat-value" th:text="${expiredActiveCount}">0</div>
            </article>
        </section>

        <section class="reservation-layout">
            <article class="panel reservation-create-panel">
            <div class="table-toolbar">
                <h2 class="section-title" th:text="#{reservation.create}">创建预约</h2>
                <span class="hint" th:text="#{reservation.createHint}">仅无可借库存的图书可创建预约。</span>
            </div>
            <form class="layui-form form-grid" th:action="@{/reservations}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div>
                    <label th:text="#{borrow.book}">图书</label>
                    <select name="bookId" lay-search required>
                        <option th:each="book : ${books}" th:value="${book.id}" th:text="${book.title + ' / ' + #messages.msg('reservation.bookOption', book.availableQuantity)}"></option>
                    </select>
                </div>
                <div>
                    <label th:text="#{borrow.reader}">读者</label>
                    <select name="readerId" lay-search required>
                        <option th:each="reader : ${readers}" th:value="${reader.id}" th:text="${reader.readerNo + ' / ' + reader.name}"></option>
                    </select>
                </div>
                <div class="form-full"><button class="layui-btn" type="submit" th:text="#{reservation.create}">创建预约</button></div>
            </form>
            </article>
            <article class="panel reservation-guide-panel">
                <h2 class="section-title" th:text="#{reservation.workflowTitle}">处理优先级</h2>
                <ol class="reservation-steps">
                    <li th:text="#{reservation.workflow.notified}">先处理已通知取书的预约。</li>
                    <li th:text="#{reservation.workflow.expiring}">清理过期预约，释放锁定库存。</li>
                    <li th:text="#{reservation.workflow.waiting}">关注排队靠前且热门的图书。</li>
                </ol>
            </article>
        </section>
        <section class="panel reservation-table-panel">
            <div class="table-toolbar reservation-toolbar">
                <div>
                    <h2 class="section-title" th:text="#{reservation.queueWorkbench}">预约队列</h2>
                    <span class="hint" th:text="#{reservation.queueHint}">优先处理已通知和即将过期的预约。</span>
                </div>
                <form class="reservation-filter" th:action="@{/reservations}" method="get">
                    <select class="layui-select" name="status">
                        <option value="ACTIVE" th:selected="${status == 'ACTIVE'}" th:text="#{reservation.status.active}">生效中</option>
                        <option value="ALL" th:selected="${status == 'ALL'}" th:text="#{reservation.status.all}">全部状态</option>
                        <option th:each="item : ${statuses}"
                                th:value="${item.name()}"
                                th:selected="${status == item.name()}"
                                th:text="${#messages.msg('reservationStatus.' + item.name())}"></option>
                    </select>
                    <input class="layui-input" name="keyword" th:value="${keyword}" th:placeholder="#{reservation.keyword.placeholder}">
                    <button class="layui-btn" type="submit" th:text="#{common.search}">搜索</button>
                    <a class="layui-btn layui-btn-primary" th:href="@{/reservations}" th:text="#{common.reset}">重置</a>
                </form>
            </div>
            <table class="layui-table responsive-table">
                <thead>
                <tr>
                    <th th:text="#{borrow.book}">图书</th>
                    <th th:text="#{borrow.reader}">读者</th>
                    <th th:text="#{reservation.queuePositionLabel}">队列</th>
                    <th th:text="#{reservation.reservedAt}">预约时间</th>
                    <th th:text="#{reservation.expiresAt}">保留至</th>
                    <th th:text="#{common.status}">状态</th>
                    <th th:text="#{common.operation}">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="reservation : ${reservations.content}">
                    <td>
                        <strong th:text="${reservation.book.title}">图书</strong>
                        <span class="reservation-subtext" th:text="${reservation.book.isbn + ' / ' + (reservation.book.location ?: #messages.msg('book.locationUnknown'))}">ISBN</span>
                    </td>
                    <td>
                        <strong th:text="${reservation.reader.readerNo + ' ' + reservation.reader.name}">读者</strong>
                        <span class="reservation-subtext" th:text="${reservation.reader.phone ?: reservation.reader.email}">联系方式</span>
                    </td>
                    <td>
                        <span th:if="${reservation.status.name() == 'WAITING'}" th:text="#{reservation.queuePosition(${queuePositions[reservation.id]})}">第 1 位</span>
                        <span th:if="${reservation.status.name() == 'NOTIFIED'}" th:text="#{reservation.pickupWindow}">待取书</span>
                        <span th:if="${reservation.status.name() != 'WAITING' and reservation.status.name() != 'NOTIFIED'}">-</span>
                    </td>
                    <td th:text="${#temporals.format(reservation.reservedAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <span th:text="${reservation.expiresAt == null ? '-' : #temporals.format(reservation.expiresAt, 'yyyy-MM-dd HH:mm')}">保留至</span>
                        <small class="reservation-expired" th:if="${reservation.expiresAt != null and reservation.expiresAt.isBefore(now) and (reservation.status.name() == 'WAITING' or reservation.status.name() == 'NOTIFIED')}" th:text="#{reservation.expired}">已过期</small>
                    </td>
                    <td>
                        <span class="reservation-status"
                              th:classappend="${' status-' + reservation.status.name().toLowerCase()}"
                              th:text="${#messages.msg('reservationStatus.' + reservation.status.name())}">状态</span>
                    </td>
                    <td class="table-actions">
                        <form th:if="${reservation.status.name() == 'WAITING' or reservation.status.name() == 'NOTIFIED'}" th:action="@{/reservations/{id}/cancel(id=${reservation.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-danger" type="submit" th:text="#{reservation.cancel}">取消</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="empty-result" th:if="${reservations.totalElements == 0}" th:text="#{reservation.empty}">暂无预约记录。</div>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${reservations.hasPrevious()}" th:href="@{|/reservations?page=${reservations.number - 1}${queryString}|}" th:text="#{common.previous}">上一页</a>
                <span th:text="|${reservations.number + 1} / ${reservations.totalPages == 0 ? 1 : reservations.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${reservations.hasNext()}" th:href="@{|/reservations?page=${reservations.number + 1}${queryString}|}" th:text="#{common.next}">下一页</a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
