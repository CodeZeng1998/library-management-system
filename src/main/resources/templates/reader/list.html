<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{reader.list.title} - #{app.name}|">读者管理 - 图书管理系统</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="#{reader.list.title}">读者管理</h1>
            <div class="table-actions">
                <a class="layui-btn layui-btn-primary" th:href="@{/readers/trash}" sec:authorize="hasAuthority('READER_DELETE')" th:text="#{reader.trash}">Trash</a>
                <a class="layui-btn layui-btn-primary" th:href="@{/readers/export}" sec:authorize="hasAuthority('READER_VIEW')" th:text="#{common.exportCsv}">导出CSV</a>
                <a class="layui-btn" th:href="@{/readers/new}" sec:authorize="hasAuthority('READER_EDIT')" th:text="#{reader.add}">新增读者</a>
            </div>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <form class="table-toolbar" th:action="@{/readers}" method="get">
                <input type="hidden" name="size" th:value="${pageSize}">
                <input class="layui-input" style="max-width: 360px;" name="keyword" th:value="${keyword}" th:placeholder="#{reader.keyword.placeholder}">
                <button class="layui-btn layui-btn-primary" type="submit" th:text="#{common.search}">搜索</button>
            </form>
            <form class="import-bar" th:action="@{/readers/import/preview}" method="post" enctype="multipart/form-data" sec:authorize="hasAuthority('READER_EDIT')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input class="layui-input" type="file" name="file" accept=".csv" required>
                <a class="layui-btn layui-btn-primary" th:href="@{/readers/import/template}">Download template</a>
                <a class="layui-btn layui-btn-primary" th:href="@{/readers/import/errors}">Error report</a>
                <button class="layui-btn" type="submit" th:text="#{common.import}">批量导入</button>
                <span class="hint" th:text="#{reader.csvHint}">CSV列：读者编号,姓名,性别,电话,邮箱,证件号,类型,等级,状态,押金</span>
            </form>
            <table class="layui-table responsive-table">
                <thead><tr><th th:text="#{reader.no}">编号</th><th th:text="#{reader.name}">姓名</th><th th:text="#{reader.phone}">电话</th><th th:text="#{reader.email}">邮箱</th><th th:text="#{reader.type}">类型</th><th th:text="#{reader.level}">等级</th><th th:text="#{common.status}">状态</th><th th:text="#{common.operation}">操作</th></tr></thead>
                <tbody>
                <tr th:each="reader : ${readers.content}">
                    <td th:text="${reader.readerNo}"></td>
                    <td th:text="${reader.name}"></td>
                    <td th:text="${reader.phone}"></td>
                    <td th:text="${reader.email}"></td>
                    <td th:text="${#messages.msg('readerType.' + reader.readerType.name())}"></td>
                    <td th:text="${#messages.msg('memberLevel.' + reader.memberLevel.name())}"></td>
                    <td><span class="status-chip" th:classappend="${' status-' + reader.status.name().toLowerCase()}" th:text="${#messages.msg('status.' + reader.status.name())}"></span></td>
                    <td class="table-actions">
                        <a class="layui-btn layui-btn-xs" th:href="@{/readers/{id}/edit(id=${reader.id})}" sec:authorize="hasAuthority('READER_EDIT')" th:text="#{common.edit}">编辑</a>
                        <form th:action="@{/readers/{id}/delete(id=${reader.id})}" method="post" th:attr="onsubmit=|return confirm('#{reader.confirmDelete}')|" sec:authorize="hasAuthority('READER_DELETE')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-danger" type="submit" th:text="#{common.delete}">删除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="empty-result" th:if="${readers.totalElements == 0}" th:text="#{reader.empty}">暂无读者记录。</div>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${readers.hasPrevious()}" th:href="@{/readers(page=${readers.number - 1}, keyword=${keyword}, size=${pageSize})}" th:text="#{common.previous}">上一页</a>
                <span th:text="|${readers.number + 1} / ${readers.totalPages == 0 ? 1 : readers.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${readers.hasNext()}" th:href="@{/readers(page=${readers.number + 1}, keyword=${keyword}, size=${pageSize})}" th:text="#{common.next}">下一页</a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
