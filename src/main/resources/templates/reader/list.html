<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>读者管理 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title">读者管理</h1>
            <div class="table-actions">
                <a class="layui-btn layui-btn-primary" th:href="@{/readers/export}">导出CSV</a>
                <a class="layui-btn" th:href="@{/readers/new}">新增读者</a>
            </div>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <form class="table-toolbar" th:action="@{/readers}" method="get">
                <input class="layui-input" style="max-width: 360px;" name="keyword" th:value="${keyword}" placeholder="姓名 / 编号 / 电话">
                <button class="layui-btn layui-btn-primary" type="submit">搜索</button>
            </form>
            <form class="import-bar" th:action="@{/readers/import}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input class="layui-input" type="file" name="file" accept=".csv" required>
                <button class="layui-btn" type="submit">批量导入</button>
                <span class="hint">CSV列：读者编号,姓名,性别,电话,邮箱,证件号,类型,等级,状态,押金</span>
            </form>
            <table class="layui-table responsive-table">
                <thead><tr><th>编号</th><th>姓名</th><th>电话</th><th>邮箱</th><th>类型</th><th>等级</th><th>状态</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="reader : ${readers.content}">
                    <td th:text="${reader.readerNo}"></td>
                    <td th:text="${reader.name}"></td>
                    <td th:text="${reader.phone}"></td>
                    <td th:text="${reader.email}"></td>
                    <td th:text="${reader.readerType.label}"></td>
                    <td th:text="${reader.memberLevel.label}"></td>
                    <td th:text="${reader.status.label}"></td>
                    <td class="table-actions">
                        <a class="layui-btn layui-btn-xs" th:href="@{/readers/{id}/edit(id=${reader.id})}">编辑</a>
                        <form th:action="@{/readers/{id}/delete(id=${reader.id})}" method="post" onsubmit="return confirm('确认删除该读者？')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-danger" type="submit">删除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${readers.hasPrevious()}" th:href="@{/readers(page=${readers.number - 1}, keyword=${keyword})}">上一页</a>
                <span th:text="|${readers.number + 1} / ${readers.totalPages == 0 ? 1 : readers.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${readers.hasNext()}" th:href="@{/readers(page=${readers.number + 1}, keyword=${keyword})}">下一页</a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
