<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>读者表单 - 图书管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="${reader.id == null ? '新增读者' : '编辑读者'}">读者表单</h1>
            <a class="layui-btn layui-btn-primary" th:href="@{/readers}">返回</a>
        </div>
        <section class="panel">
            <form class="layui-form" th:action="@{/readers}" th:object="${reader}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{id}">
                <div class="form-grid">
                    <div><label>读者编号</label><input class="layui-input" th:field="*{readerNo}" placeholder="留空自动生成"></div>
                    <div><label>姓名</label><input class="layui-input" th:field="*{name}" required></div>
                    <div><label>性别</label><input class="layui-input" th:field="*{gender}"></div>
                    <div><label>联系电话</label><input class="layui-input" th:field="*{phone}"></div>
                    <div><label>邮箱</label><input class="layui-input" type="email" th:field="*{email}" required></div>
                    <div><label>身份证号/学号</label><input class="layui-input" th:field="*{identityNo}" required></div>
                    <div>
                        <label>读者类型</label>
                        <select th:field="*{readerType}">
                            <option th:each="type : ${readerTypes}" th:value="${type}" th:text="${type.label}"></option>
                        </select>
                    </div>
                    <div>
                        <label>会员等级</label>
                        <select th:field="*{memberLevel}">
                            <option th:each="level : ${memberLevels}" th:value="${level}" th:text="${level.label}"></option>
                        </select>
                    </div>
                    <div>
                        <label>账号状态</label>
                        <select th:field="*{status}">
                            <option th:each="status : ${accountStatuses}" th:value="${status}" th:text="${status.label}"></option>
                        </select>
                    </div>
                    <div><label>押金</label><input class="layui-input" type="number" step="0.01" min="0" th:field="*{depositAmount}"></div>
                </div>
                <div style="margin-top: 18px;">
                    <button class="layui-btn" type="submit">保存</button>
                </div>
            </form>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
