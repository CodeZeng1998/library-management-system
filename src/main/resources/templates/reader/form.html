<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{reader.form.title} - #{app.name}|">读者表单 - 图书管理系统</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="${reader.id == null ? #messages.msg('reader.form.add') : #messages.msg('reader.form.edit')}">读者表单</h1>
            <a class="layui-btn layui-btn-primary" th:href="@{/readers}" th:text="#{common.back}">返回</a>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <form class="layui-form" th:action="@{/readers}" th:object="${reader}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{id}">
                <div class="form-section">
                    <h2 th:text="#{reader.form.basicInfo}">基础资料</h2>
                    <div class="form-grid compact-form-grid">
                        <div><label th:text="#{reader.no}">读者编号</label><input class="layui-input" th:field="*{readerNo}" th:placeholder="#{reader.no.placeholder}" autocomplete="off"></div>
                        <div><label th:text="#{reader.name}">姓名</label><input class="layui-input" th:field="*{name}" required autocomplete="name"></div>
                        <div><label th:text="#{reader.gender}">性别</label><input class="layui-input" th:field="*{gender}" autocomplete="off"></div>
                        <div><label th:text="#{reader.phone}">联系电话</label><input class="layui-input" th:field="*{phone}" autocomplete="tel"></div>
                        <div><label th:text="#{reader.email}">邮箱</label><input class="layui-input" type="email" th:field="*{email}" required autocomplete="email"></div>
                        <div><label th:text="#{reader.identityNo}">身份证号/学号</label><input class="layui-input" th:field="*{identityNo}" required autocomplete="off"></div>
                    </div>
                </div>
                <div class="form-section">
                    <h2 th:text="#{reader.form.accountInfo}">账户策略</h2>
                    <div class="form-grid compact-form-grid">
                        <div>
                            <label th:text="#{reader.type}">读者类型</label>
                            <select th:field="*{readerType}">
                                <option th:each="type : ${readerTypes}" th:value="${type}" th:text="${#messages.msg('readerType.' + type.name())}"></option>
                            </select>
                        </div>
                        <div>
                            <label th:text="#{reader.level}">会员等级</label>
                            <select th:field="*{memberLevel}">
                                <option th:each="level : ${memberLevels}" th:value="${level}" th:text="${#messages.msg('memberLevel.' + level.name())}"></option>
                            </select>
                        </div>
                        <div>
                            <label th:text="#{reader.status}">账号状态</label>
                            <select th:field="*{status}">
                                <option th:each="status : ${accountStatuses}" th:value="${status}" th:text="${#messages.msg('status.' + status.name())}"></option>
                            </select>
                        </div>
                        <div><label th:text="#{reader.deposit}">押金</label><input class="layui-input" type="number" step="0.01" min="0" th:field="*{depositAmount}"></div>
                    </div>
                </div>
                <div class="form-actions">
                    <a class="layui-btn layui-btn-primary" th:href="@{/readers}" th:text="#{common.back}">返回</a>
                    <button class="layui-btn" type="submit" th:text="#{common.save}">保存</button>
                </div>
            </form>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
