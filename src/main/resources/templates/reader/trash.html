<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{reader.trash} - #{app.name}|">Reader Trash</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <h1 class="page-title" th:text="#{reader.trash}">Reader Trash</h1>
            <div class="table-actions">
                <a class="layui-btn layui-btn-primary" th:href="@{/readers}" th:text="#{common.back}">Back</a>
            </div>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>
        <section class="panel">
            <div class="table-toolbar">
                <h2 class="section-title" th:text="#{reader.trashCount(${readers.totalElements})}">Deleted readers</h2>
                <span class="hint" th:text="#{reader.trashHint}">Restore records deleted by mistake.</span>
            </div>
            <table class="layui-table responsive-table">
                <thead><tr><th th:text="#{reader.no}">No.</th><th th:text="#{reader.name}">Name</th><th th:text="#{reader.phone}">Phone</th><th th:text="#{reader.email}">Email</th><th th:text="#{common.time}">Time</th><th th:text="#{common.operation}">Actions</th></tr></thead>
                <tbody>
                <tr th:each="reader : ${readers.content}">
                    <td th:text="${reader.readerNo}">No.</td>
                    <td th:text="${reader.name}">Name</td>
                    <td th:text="${reader.phone ?: '-'}">Phone</td>
                    <td th:text="${reader.email}">Email</td>
                    <td th:text="${#temporals.format(reader.updateTime, 'yyyy-MM-dd HH:mm')}">Time</td>
                    <td class="table-actions">
                        <form class="inline-form" th:action="@{/readers/{id}/restore(id=${reader.id})}" method="post" th:attr="onsubmit=|return confirm('#{reader.confirmRestore}')|">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs" type="submit" th:text="#{common.restore}">Restore</button>
                        </form>
                        <form class="inline-form" th:action="@{/readers/{id}/purge(id=${reader.id})}" method="post" th:attr="onsubmit=|return confirm('#{reader.confirmPurge}')|">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="layui-btn layui-btn-xs layui-btn-danger" type="submit" th:text="#{common.purge}">Delete permanently</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="empty-result" th:if="${readers.totalElements == 0}" th:text="#{reader.trashEmpty}">No deleted readers.</div>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${readers.hasPrevious()}" th:href="@{/readers/trash(page=${readers.number - 1}, size=${pageSize})}" th:text="#{common.previous}">Previous</a>
                <span th:text="|${readers.number + 1} / ${readers.totalPages == 0 ? 1 : readers.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${readers.hasNext()}" th:href="@{/readers/trash(page=${readers.number + 1}, size=${pageSize})}" th:text="#{common.next}">Next</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
