<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|#{category.title} - #{app.name}|">Category Management</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/css/layui.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/nav :: sidebar}"></div>
    <main class="content">
        <div class="topbar">
            <div>
                <h1 class="page-title" th:text="#{category.title}">Category Management</h1>
                <p class="portal-subtitle" th:text="#{category.subtitle}">Book taxonomy and dictionary governance</p>
            </div>
        </div>
        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <section class="panel">
            <div class="table-toolbar">
                <div>
                    <h2 class="section-title" th:text="${category.id == null ? #messages.msg('category.add') : #messages.msg('category.edit')}">Add category</h2>
                    <span class="hint" th:text="#{category.formHint}">Keep names short and reusable across cataloging.</span>
                </div>
            </div>
            <form class="form-grid compact-form-grid" th:action="@{/categories}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="${category.id}">
                <input type="hidden" name="keyword" th:value="${keyword}">
                <div>
                    <label th:text="#{category.name}">Name</label>
                    <input class="layui-input" th:field="${category.name}" maxlength="64" required>
                </div>
                <div>
                    <label th:text="#{category.parent}">Parent</label>
                    <select class="layui-select" name="parentId">
                        <option value="" th:text="#{category.noParent}">No parent</option>
                        <option th:each="parent : ${parents}"
                                th:value="${parent.id}"
                                th:selected="${category.parent != null and category.parent.id == parent.id}"
                                th:text="${@localizedTextService.categoryName(parent)}">Parent</option>
                    </select>
                </div>
                <div>
                    <label th:text="#{common.description}">Description</label>
                    <input class="layui-input" th:field="${category.description}" maxlength="200">
                </div>
                <div class="table-actions">
                    <button class="layui-btn" type="submit" th:text="#{common.save}">Save</button>
                    <a class="layui-btn layui-btn-primary" th:href="@{/categories}" th:text="#{common.reset}">Reset</a>
                </div>
            </form>
        </section>

        <section class="panel">
            <div class="table-toolbar">
                <div>
                    <h2 class="section-title" th:text="#{category.listTitle}">Category Dictionary</h2>
                    <span class="hint" th:text="#{category.keyword.placeholder}">Name / description</span>
                </div>
                <form class="admin-filter" th:action="@{/categories}" method="get">
                    <input class="layui-input" name="keyword" th:value="${keyword}" th:placeholder="#{category.keyword.placeholder}">
                    <button class="layui-btn" type="submit" th:text="#{common.search}">Search</button>
                    <a class="layui-btn layui-btn-primary" th:href="@{/categories}" th:text="#{common.reset}">Reset</a>
                    <a class="layui-btn layui-btn-primary" th:href="@{|/categories/export?keyword=${keyword ?: ''}|}" th:text="#{common.exportCsv}">Export CSV</a>
                </form>
            </div>
            <table class="layui-table responsive-table">
                <thead>
                <tr>
                    <th th:text="#{category.name}">Name</th>
                    <th th:text="#{category.parent}">Parent</th>
                    <th th:text="#{common.description}">Description</th>
                    <th th:text="#{common.time}">Time</th>
                    <th th:text="#{common.operation}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${categories.content}">
                    <td th:text="${@localizedTextService.categoryName(item)}">Name</td>
                    <td th:text="${item.parent == null ? #messages.msg('category.noParent') : @localizedTextService.categoryName(item.parent)}">Parent</td>
                    <td th:text="${item.description ?: '-'}">Description</td>
                    <td th:text="${#temporals.format(item.updateTime, 'yyyy-MM-dd HH:mm')}">Time</td>
                    <td class="table-actions">
                        <a class="layui-btn layui-btn-xs" th:href="@{|/categories/${item.id}/edit?page=${categories.number}${queryString}|}" th:text="#{common.edit}">Edit</a>
                        <form th:action="@{/categories/{id}/delete(id=${item.id})}" method="post" th:attr="onsubmit=|return confirm('#{category.confirmDelete}')|">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="keyword" th:value="${keyword}">
                            <button class="layui-btn layui-btn-xs layui-btn-danger" type="submit" th:text="#{common.delete}">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="empty-result" th:if="${categories.totalElements == 0}" th:text="#{category.empty}">No categories.</div>
            <div class="table-actions">
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${categories.hasPrevious()}" th:href="@{|/categories?page=${categories.number - 1}${queryString}|}" th:text="#{common.previous}">Previous</a>
                <span th:text="|${categories.number + 1} / ${categories.totalPages == 0 ? 1 : categories.totalPages}|"></span>
                <a class="layui-btn layui-btn-sm layui-btn-primary" th:if="${categories.hasNext()}" th:href="@{|/categories?page=${categories.number + 1}${queryString}|}" th:text="#{common.next}">Next</a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.18/dist/layui.min.js"></script>
</body>
</html>
