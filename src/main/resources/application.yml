server:
  port: 8090

spring:
  application:
    name: library-management-system
  datasource:
    url: jdbc:mysql://localhost:3306/library_management_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

app:
  security:
    remember-me-key: library-management-system-dev-key
